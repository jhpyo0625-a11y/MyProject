# --- Paths -------------------------------------------------------------------
paths:
  dataset_root:   "Coil-image-Dataset"
  crops_dir:      "data/crops"
  embeddings_dir: "data/embeddings"
  manifest:       "data/manifest.csv"
  labels_db:      "data/labels.db"
  models_dir:     "models"
  production_dir: "models/production"
  archive_dir:    "models/archive"
  experiments:    "experiments"
  reports:        "reports"
  prediction_log: "data/prediction_log.csv"
  watch_folder:   ""   # optional: path camera software drops new BMPs into

# --- Preprocessing -----------------------------------------------------------
preprocessing:
  # Fixed crop in full 2448x2048 frame (x_min, y_min, x_max, y_max).
  # Validated on sample images; confirm with scripts/validate_crop.py before use.
  crop:
    x_min: 300
    y_min: 620
    x_max: 2000
    y_max: 1320
  resize:
    width:  448
    height: 192
  # ImageNet normalization (matches pretrained backbone expectations)
  normalize:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

# --- Augmentation ------------------------------------------------------------
augmentation:
  brightness_factor: 0.3
  contrast_factor:   0.3
  max_rotation_deg:  5
  max_translate_px:  50
  minority_copies:   5   # augmented versions per Dent/Loose image

# --- Model -------------------------------------------------------------------
model:
  backbone: "resnet18"   # options: resnet18 | efficientnet_b0 | mobilenetv3_small_100
  classifier: "logreg"   # options: logreg | svm | gbt

# --- Training ----------------------------------------------------------------
training:
  n_folds:          5
  comparison_fold:  4    # held out for old-vs-new model comparison; never in training
  random_seed:      42
  logreg_C:         1.0
  class_weight:     "balanced"

# --- Decision thresholds -----------------------------------------------------
# Tuned in src/training/threshold.py; placeholders until first run.
decision:
  pass_threshold:    0.5   # P(Fail) above this -> Fail
  review_band_delta: 0.05  # +/-delta around threshold -> Review

# --- Retraining --------------------------------------------------------------
retraining:
  trigger_count: 50   # new confirmed labels needed to recommend retraining

# --- Recall target (go-live bar) ---------------------------------------------
evaluation:
  target_fail_recall: 0.95

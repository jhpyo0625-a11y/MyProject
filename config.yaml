augmentation:
  brightness_factor: 0.3
  contrast_factor: 0.3
  max_rotation_deg: 5
  max_translate_px: 50
  minority_copies: 5
decision:
  pass_threshold: 0.554156
  review_band_delta: 0.05
evaluation:
  target_fail_recall: 0.95
model:
  backbone: resnet18
  classifier: logreg
paths:
  archive_dir: models/archive
  crops_dir: data/crops
  dataset_root: Coil-image-Dataset
  embeddings_dir: data/embeddings
  experiments: experiments
  labels_db: data/labels.db
  manifest: data/manifest.csv
  models_dir: models
  prediction_log: data/prediction_log.csv
  production_dir: models/production
  reports: reports
  watch_folder: ''
preprocessing:
  crop:
    x_max: 2000
    x_min: 300
    y_max: 1480
    y_min: 610
  normalize:
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
  resize:
    height: 224
    width: 448
retraining:
  trigger_count: 50
training:
  class_weight: balanced
  comparison_fold: 4
  logreg_C: 1.0
  n_folds: 5
  random_seed: 42
